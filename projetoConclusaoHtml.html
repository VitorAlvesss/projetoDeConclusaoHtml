<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            margin: 0;
            background-color: #F8F0EC;
        }

        header {
            padding: 16px 32px;
            background-color:#FAEEE5;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navCabecalho{
            display: flex;
            justify-content: center;
            align-items: center;            
            gap: 50px;
        }

        .navCabecalho ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            /* padding-top: 90px; */
            gap: 90px;
        }

        .navCabecalho a {
                text-decoration: none;
                color: #64463F;
                font-size: 1.5rem;
            }

        .imagemLogo{
            width: 220px;
            height: auto;
        }
        
        .carrossel{
            width: 100%;
            height: 500px;
            overflow: hidden;
            margin: 0;
            display: flex;
        }

        
       .grupo {
            display: flex;
            animation: spin 40s infinite linear;
        }

        .grupo img {
            object-fit: cover;
            object-position: center;
        }

        @keyframes spin {
            from { transform: translateX(0); }
            to { transform: translateX(-500vw); }
        }

        .containerCards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 32px;
        }

        .containerCards img {
            width: 100%;
            height: auto;
            border-radius: 12px;
        }

        .tituloSabores{
            text-align: center;
            color: #64463F;
            font-size: 2.5rem;
        }
        
        .textoReceita{
            text-align: center;
            font-size: 1.5rem;
            margin: 0 auto;
        }
        

        @media (max-width: 768px) {
            .navCabecalho{
                flex-direction: column;
                gap: 16px;
            }

            .navCabecalho ul {
                justify-content: center;
            }


            .carrossel {
                height: 250px;
            }

            .grupo img {
                height: 250px;
            }

            .containerCards{
                grid-template-columns: repeat(2, 1fr);
            }

            header{
                position: static;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav class="navCabecalho">
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Sabores</a></li>
            </ul>  
            <img class="imagemLogo" src="imagem.png" alt="logo">   
            <ul>
                <li><a href="#">Quem somos</a></li>
                <li><a href="#">Parceiras</a></li>
            </ul>    
        </nav>
    </header>
    <main>
        <div class="carrossel">
            <div class="grupo">
                <img class="imagemMobile" src="imagem1.png" alt="sabor">
                <img src="imagem1.png" alt="sabor 1">
                <img src="imagem2.png" alt="sabor 2">
                <img src="imagem3.png" alt="sabor 3">
                <img src="imagem4.png" alt="sabor 4">
                <img src="imagem5.png" alt="sabor 5">
            </div>
            <div aria-hidden class="grupo">
                <img src="imagem1.png" alt="sabor 1">
                <img src="imagem2.png" alt="sabor 2">
                <img src="imagem3.png" alt="sabor 3">
                <img src="imagem4.png" alt="sabor 4">
                <img src="imagem5.png" alt="sabor 5">
            </div>           
        </div>

        <section class="sectionCards">
            <h2 class="tituloSabores">Nossos sabores</h2>
            <p class="textoReceita">Descubra nossas receitas artesanais.</p>
            <div class="containerCards">
                <img src="card1.png" alt="sabor 1">
                <img src="card2.png" alt="sabor 2">
                <img src="card3.png" alt="sabor 3">
                <img src="card4.png" alt="sabor 4">
            </div>
        </section>
    </main>
</body>
</html>
