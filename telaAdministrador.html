<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Administrador</title>
    <link rel="stylesheet" type="text/css" href="styleTelaAdministrador.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="controller/baseUrl.js" defer></script>
    <script src="view/view.js" defer></script>
    <script src="view/linhasColunas.js" defer></script>
    <script src="controller/administrador.js" defer></script>
    <script src="controller/excluirUsuario.js" defer></script>
    <script src="controller/editarUsuario.js" defer></script>
</head>
<body>
    <header>
        <nav class="navCabecalho">
            <ul>
                <li><a href="projetoConclusaoHtml.html">Tela Principal</a></li>
            </ul>  
            <img class="imagemLogo" src="imagensLogo/imagem.png" alt="logo">   
            <ul>
                <li><a href="pag_quemSomos.html">Quem somos</a></li>
            </ul>    
        </nav>
    </header>
    <main>

        <section class="tituloPrincipal">
            <h1 id="direcionarContato" class="tituloFale">Faça o login para garantir os seus pedidos!</h1>
        </section>

        <section>
            <table class="table table-dark table-striped-columns">

                <thead>
                    <tr>
                        <th>NOME</th>
                        <th>EMAIL</th>
                        <th>AÇÕES</th>
                    </tr>
                </thead>

                <tbody id="corpoTabela">

                </tbody>
            </table>

            <button id="btnBuscar">BUSCAR</button>
        </section>

        <dialog id="popup">
            <input id="nomeModal" type="text" placeholder="Nome"> 
            <input id="emailModal" type="email" placeholder="Email"> 
            <button id="salvar">Salvar</button>
            <button id="fecharModal">Fechar</button>  
        </dialog>

                
    </main>

    <footer>
        
    </footer>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</body>
</html>
